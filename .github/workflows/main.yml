# Runs only on pushes to main.
name: Main Branch Push
on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: francdomain/reusable-pipeline-templates/.github/workflows/java-on-main-branch-update.yml@shared/java
    with:
      docker-registry: "docker.io"
      docker-image-name: "francdocmain/demo-java-app"
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
      gitops-repo: "francdomain/gitops-manifests"
      image-pull-secret-enabled: false
      # argocd-server: "argocd.yourdomain.com"
      rollout-enabled: true
      gitops-branch: "main"
      gitops-values-path: "uat/values/demo-java-app.yaml"
      image-pull-secret-enabled: false
      argocd-server: "ae6a8cb58ca8a4c84aa7a60a4c689aac-194937836.us-east-1.elb.amazonaws.com"  # from terraform output
      argocd-app-name: "demo-java-app"
    secrets: inherit
