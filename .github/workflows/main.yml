# Runs only on pushes to main.
name: Main Branch Push
on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: francdomain/reusable-pipeline-templates/.github/workflows/java-on-main-branch-update.yml@shared/java
    with:
      docker-registry: "docker.io"
      docker-image-name: "francdocmain/demo-java-app"
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets: inherit
