name: Feature Branch Push

on:
  push:
    branches:
      - "feature/*"

jobs:
  ci:
    uses: francdomain/reusable-pipeline-templates/.github/workflows/java-on-feature-branch.yml@shared/java
    with:
      docker-registry: "docker.io"
      docker-image-name: "francdocmain/demo-java-app"
      gitops-repo: "francdomain/gitops-manifests"
      gitops-branch: "main"
      gitops-values-path: "development/values/demo-java-app.yaml"
      image-pull-secret-enabled: false
      argocd-server: ${{ vars.ARGOCD_SERVER }}
      argocd-app-name: "demo-java-app"
      rollout-enabled: false
    secrets: inherit
